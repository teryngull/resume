<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">TG monogram logo</title>
  <desc id="desc">Rounded square logo mark with the initials T and G.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#072132" />
      <stop offset="60%" stop-color="#0d3344" />
      <stop offset="100%" stop-color="#0b8f85" />
    </linearGradient>
    <linearGradient id="ringGradient" x1="15%" y1="15%" x2="85%" y2="85%">
      <stop offset="0%" stop-color="#7ffbf0" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff" />
      <stop offset="100%" stop-color="#67f7e6" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0b1120" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="118" fill="url(#bgGradient)" />
  <rect
    x="34"
    y="34"
    width="444"
    height="444"
    rx="104"
    fill="none"
    stroke="url(#ringGradient)"
    stroke-width="14"
    stroke-opacity="0.75"
  />

  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Sora, Manrope, Segoe UI, Helvetica, Arial, sans-serif"
    font-size="196"
    font-weight="800"
    letter-spacing="-10"
    fill="url(#textGradient)"
    filter="url(#softGlow)"
  >
    TG
  </text>
</svg>
